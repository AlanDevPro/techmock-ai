[alembic]
# Ruta al script de migraciones
script_location = alembic

# Formato de nombres de archivos de migración
# Ejemplo: 20241201_143022_add_users_table.py
file_template = %%(year)d%%(month)02d%%(day)02d_%%(hour)02d%%(minute)02d%%(second)02d_%%(slug)s

# Codificación del sistema de archivos
prepend_sys_path = .

# Versión de la ubicación de las migraciones
version_path_separator = os

# La URL de la BD se sobreescribe desde config.py (lee el .env)
# No cambies esto manualmente, se gestiona desde app/core/config.py
sqlalchemy.url = postgresql+asyncpg://postgres:tu_password@localhost:5432/techmock_db


# =========================
# LOGGING
# =========================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
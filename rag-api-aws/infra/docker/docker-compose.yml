version: "3.9"

services:

  api:
    image: rag-api:latest
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - OPENSEARCH_URL=http://opensearch:9200

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true